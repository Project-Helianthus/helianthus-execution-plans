    access_mechanism: authenticated_bounded_query_polling
    version_compatibility: reject_incompatible_contract_versions
    authentication: noninteractive_least_privilege
    confidential_channel: required
    server_identity: verified
    credential_lifecycle_recovery: [provision, rotate, revoke, disable, recover]
    ingress_recovery: [bounded_reconnect_backoff, explicit_disable, stale_unavailable_propagation]
    forbidden_ingress_sources: [helianthus-modbus, helianthus-modbusreg, gateway_internals, undocumented_network_paths]
    tests_external_channel: PUBLIC_GRAPHQL_M2M_V1
