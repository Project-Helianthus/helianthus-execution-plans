risks:
  - id: R01
    statement: Profile ambiguity can silently assign the wrong register meaning.
    mitigation: Fail closed, preserve raw evidence, and require cross-profile ambiguity fixtures.
    stop_trigger: More than one eligible profile remains after bounded read-only probes.
  - id: R02
    statement: Function/table aliasing, incorrect coalesced slicing, documentary off-by-one addressing, reuse of an abandoned TCP transaction ID, delivery of a late same-shape RTU response, wrong codec order/packing, mixed generations, torn samples, or conflated source/canonical state can corrupt values.
    mitigation: Bind wire_response_id to the physical request/range and every logical observation to logical_view_id plus exact slice identity; reject incompatible coalescing, preserve write/response-wait recovery, keep protocol words uninterpreted, version codec interpretation/coherence, and leave canonical transitions to ebusreg.
    stop_trigger: A replay cannot reproduce exact logical-view words/provenance, incompatible reads coalesce, a late response crosses identity, a sample aliases FC03/FC04, mixes generations, or emits after an unvalidated torn read.
  - id: R03
    statement: Endpoint contention, incorrect connection-wide correlation, tombstone exhaustion, RTU failure to quiesce, or reconnect storms can starve consumers or misdeliver responses.
    mitigation: One endpoint owner, one MBAP allocator/map per connection across all units, socket-lifetime tombstones with controlled generation rollover, isolated state, bounded scheduling, and RTU fixture-only default-disabled experimental status until RTU_PHYSICAL_QUALIFICATION_V1 records adapter/transceiver, baud/topology, physical silent intervals, and timeout/cancellation quarantine.
    stop_trigger: Tests exceed limits, reuse a tombstoned ID, accept an old-generation frame, misdeliver a logical slice, or claim RTU enabled/supported without the named physical qualification evidence.
  - id: R04
    statement: Operator-authored Huawei analysis may contain stale or branch-inapplicable conclusions.
    mitigation: Rebuild provenance, model, gateway, firmware-branch, and probe evidence; enumerate every detector operation against the runtime FC03/FC04/FC2B-MEI0E allowlist; inventory EMMA discriminators or mark unavailable while semantics remain deferred.
    stop_trigger: A claimed register lacks branch evidence, a detector needs an unowned operation, modbusreg frames a PDU, EMMA activates a Huawei profile, or automatic eligibility lacks reliable discrimination.
  - id: R05
    statement: Private binding knowledge could flow upstream and contaminate public artifacts.
    mitigation: One-way dependencies, clean public CI, sanitized evidence, and import scans.
    stop_trigger: Any public build, test, fixture, or document requires a private path or artifact.
  - id: R06
    statement: A private binding could use plaintext, untrusted identity, an incompatible or undocumented ingress, or stale/non-live data while appearing compatible.
    mitigation: Require both eeBUS and Matter to consume exactly packaged PUBLIC_GRAPHQL_M2M_V1 through authenticated bounded polling, compatible versions, confidential transport, verified server identity, and credential lifecycle/recovery; reject forbidden imports and permit myVaillant GO only for the same fresh live observation.
    stop_trigger: Credentials cross plaintext/untrusted identity, M8 has other than one concrete ingress, a private binding uses Modbus/modbusreg/gateway internals or an undocumented network path, or the myVaillant trace is not live/fresh/same-observation end to end.
  - id: R07
    statement: Read-only work can accidentally expose a write-capable primitive.
    mitigation: Omit write functions from public phase-1 APIs and assert read-only function allowlists.
    stop_trigger: A write PDU, write probe, or control surface is reachable.
  - id: R08
    statement: Hardware-dependent claims may be promoted from fixture-only evidence.
    mitigation: Keep fixture-only profiles default-disabled experimental opt-in and require a matching versioned hardware record before auto-eligibility or support claims.
    stop_trigger: A profile auto-activates or a release claims a supported device/gateway without its matching hardware qualification record.

