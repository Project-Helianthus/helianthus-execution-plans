decisions:
  - id: D01
    status: accepted
    decision: One public helianthus-modbus owns Modbus protocol, TCP and RTU transports, endpoint scheduling, limits, and recovery; the exact ordered abnormal transport-write result set is provable_zero, partial_write, indeterminate_error, cancellation_race, ambiguous_completion, only provable_zero avoids abandonment, every other abnormal result forces TCP close/reconnect handling and RTU quarantine/recovery, full_transmit_success separately enters response_wait with TCP tombstone/late-drop or RTU quarantine on wait timeout/cancellation, and unit/profile state remains isolated. RTU remains default-disabled experimental fixture-only capability until RTU_PHYSICAL_QUALIFICATION_V1 passes; absent hardware creates no enabled/supported claim and blocks no TCP-sufficient M1, Fronius, or M7 work.
  - id: D02
    status: accepted
    decision: One public helianthus-modbusreg owns standard and vendor profile families; no repository is created per vendor.
  - id: D03
    status: accepted
    decision: SunSpec is a standard profile family; public evidence companion FMV3-M3-01 governs M3-02/M3-03, Fronius uses STANDARD_ONLY with public evidence and no implementation commit or empty overlay when qualified evidence proves the slice fully standard, and OVERLAY_REQUIRED alone triggers overlay RED/code work; FMV3-M7-01 pre-publishes the complete Growatt candidate/admission contract and governs M7-02/M7-03/M7-04, PROFILE_ADMITTED alone triggers RED/code, and NO_ADMISSIBLE_PROFILE preserves the pre-published public evidence and unsupported disposition without code, catalog, or support claim.
  - id: D04
    status: accepted
    decision: Fronius phase 1 is Modbus TCP read-only, with no write function, write probe, or control API.
  - id: D05
    status: accepted
    decision: Profile detection is deterministic, bounded, read-only, version-aware, and fail-closed; fixture-only profiles are default-disabled experimental opt-in, and automatic eligibility requires a matching hardware qualification record.
  - id: D06
    status: accepted
    decision: Raw MCP and live Fronius evidence precede canonical PV docs and semantic implementation; candidate Fronius-to-canonical mapping and semantic MCP then pass golden and live tests before a separate lock pins that exact MCP version, after which promotion serializes through one public GraphQL companion-doc issue, GraphQL whose credential-bearing external channel is authenticated/confidential with verified server identity, a GraphQL-only semantic Portal plus authenticated bounded raw Portal diagnostics, Home Assistant, and packaged rollout.
  - id: D07
    status: accepted
    decision: Private eeBUS and Matter repositories are generic output bindings and start implementation only after the completed public consumer and packaged rollout; both consume exactly PUBLIC_GRAPHQL_M2M_V1 by authenticated bounded query/polling with compatible version enforcement, noninteractive least privilege, confidential transport, verified server identity, and credential lifecycle/recovery, and reject plaintext, untrusted identity, subscriptions, Modbus/modbusreg/gateway-internal imports, and undocumented network paths. eeBUS additionally owns minimum SHIP/SPINE discovery and trust lifecycle; this plan creates no public eeBUS repository.
  - id: D08
    status: accepted
    decision: Public repositories, CI, builds, tests, and documentation never depend on private repositories or private artifacts.
  - id: D09
    status: accepted
    decision: Huawei facts are re-derived with provenance and branch-specific applicability; v49 and v52 are parallel branches, EMMA semantics remain deferred, M7-01 inventories or individually marks unavailable its gateway/model/software/version discriminators, and EMMA or insufficiently distinguished endpoints can only return no_match or insufficient_evidence and never activate SmartLogger/S-Dongle or Huawei automatic eligibility.
  - id: D10
    status: accepted
    decision: Milestones group work; the issue DAG is authoritative, TCP precedes RTU in helianthus-modbus, FMV3-M7-01 waits for the critical docs lane through FMV3-M5-09 before serialized M7 profile work, Growatt NO_ADMISSIBLE_PROFILE still releases Huawei without a conditional GO gate, and topology/preflight enforce at most one active issue and one active PR per repository.
  - id: D11
    status: accepted
    decision: Gateway package internal/modbusadapter implements the existing protocol-agnostic adapter interface and is the only gateway package allowed to import helianthus-modbus or helianthus-modbusreg; gateway core tests use a fake adapter.
  - id: D12
    status: accepted
    decision: Every physical read response has a wire_response_id bound to its physical request/range, and every dependent logical observation has a linked logical_view_id plus exact slice identity; raw dependency identity also includes endpoint, unit, function/table, logical zero-based PDU offset/count, sample identity, and recorded documentary address normalization. Versioned modbusreg codec/provenance fields own multi-register word order, applicable intra-word byte order, string packing and padding, while profile-declared coherence rejects unrecoverable torn multi-response reads.

milestones:
  - id: M0
    title: Governance, repository bootstraps, and boundary documentation
    depends_on: []
    exit_gate: Governance has created the four planned repositories, destination bootstraps have run after creation, and public/private import direction is documented.
  - id: M1
    title: helianthus-modbus foundation
    depends_on: [M0]
    exit_gate: The bounded public Modbus companion documents the exact write/response-wait and wire-response/logical-view coalescing identity contracts before implementation; protocol core and TCP conformance are green. RTU fixture conformance may close as default-disabled experimental FIXTURE_ONLY_NO_HARDWARE; only RTU_PHYSICAL_QUALIFICATION_V1 permits an enabled/supported RTU claim, and its absence blocks no TCP-sufficient work.
  - id: M2
    title: helianthus-modbusreg framework
    depends_on: [M0]
    exit_gate: The reused FMV3-M1-00 public companion is merged before M2 implementation; profile API, exact wire-response/logical-view/sample identity and provenance, coherence, detector activation and hardware-qualification lifecycle, coalescing mutation format, and conformance harness are stable.
  - id: M3
    title: Minimal SunSpec family, Fronius applicability, and fixtures
    depends_on: [M2]
    exit_gate: Companion FMV3-M3-01 governs the minimal standard SunSpec family and Fronius disposition; STANDARD_ONLY records public evidence with green conformance CI and no implementation commit or empty overlay, while only OVERLAY_REQUIRED triggers overlay RED/code work.
  - id: M4
    title: Gateway raw MCP integration and live read-only proof
    depends_on: [M3]
    exit_gate: The gateway-local adapter boundary, raw MCP replay, and coherent sample identity pass; FMV3-M4-04 records outcome GO and FMV3-M4-05 packages its sanitized evidence before M5 can progress.
  - id: M5
    title: Canonical PV semantic lock and public consumer promotion
    depends_on: [M4]
    exit_gate: Public canonical docs and semantic implementation precede FMV3-M5-04 candidate mapping plus golden/live semantic MCP tests; FMV3-M5-03 then locks that exact MCP version with GO before serialized PUBLIC_GRAPHQL_M2M_V1 companion docs, externally tested GraphQL, Portal, Home Assistant, and compatibility-safe add-on packaging, while bounded raw Portal diagnostics remain separate.
  - id: M6
    title: Generic private eeBUS binding and myVaillant lab proof
    depends_on: [M5]
    exit_gate: After the public eeBUS companion merges, the private binding consumes exactly the packaged GraphQL contract and proves SHIP/SPINE lifecycle; M6-02 succeeds only on live GO, and M6-03 then publishes sanitized reusable interoperability knowledge or records STOP when provenance/licensing forbids publication.
  - id: M7
    title: SunSpec, Growatt, and Huawei profile expansion
    depends_on: [M1, M2, M3]
    exit_gate: After the Fronius vertical and critical docs lane through FMV3-M5-09, companion FMV3-M7-01 publishes the complete Growatt contract and an EMMA gateway/model/software/version discriminator inventory or per-field unavailable markers; serialized SunSpec, Growatt, and Huawei work keeps EMMA semantics deferred and blocks Huawei automatic eligibility when reliable discrimination is unavailable.
  - id: M8
    title: Generic private Matter binding
    depends_on: [M0, M5]
    exit_gate: After packaged M5-08 rollout and the public Matter companion, exactly one M8 ingress consumes PUBLIC_GRAPHQL_M2M_V1 through the same authenticated bounded query/polling, compatibility, confidential-channel, verified-identity, and credential lifecycle/recovery contract as eeBUS; security tests reject forbidden imports and undocumented network paths, independently of M6.

