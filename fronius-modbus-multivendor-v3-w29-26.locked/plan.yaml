  - id: FMV3-M1-00
    milestone: M1
    repo: Project-Helianthus/helianthus-docs-ebus
    depends_on: [FMV3-M0-02, FMV3-M0-06]
    what: Publish one bounded public companion contract for the M1 Modbus foundation and complete M2 registry contracts before implementation.
    acceptance: One docs issue/PR defines Modbus framing and the exact phase-1 read-only operations FC03 Read Holding Registers, FC04 Read Input Registers, and FC2B/MEI0E Read Device Identification, including conformity levels, object IDs, segmentation/more-follows, bounds, exceptions, and malformed responses on TCP/RTU. It also defines transport recovery, coalescing identity, RTU qualification, and complete M2 contracts before implementation.
    gates: [doc_gate, licensing, protocol_interop]
    doc_gate: companion
    companion_for: [FMV3-M1-01, FMV3-M1-02, FMV3-M1-03, FMV3-M1-04, FMV3-M2-01, FMV3-M2-02, FMV3-M2-03]
    phase1_read_only_operations: [fc03_read_holding_registers, fc04_read_input_registers, fc2b_mei0e_read_device_identification]
    transport_abandonment_docs: [write_linearization, full_transmit_response_wait, tcp_socket_lifetime_tombstones, tcp_close_on_possibly_transmitted, tcp_generation_rollover, rtu_response_latency_bus_idle_quarantine]
    transport_write_linearization:
      boundary: transport_write_invoked
      abnormal_results: [provable_zero, partial_write, indeterminate_error, cancellation_race, ambiguous_completion]
      no_abandonment_only_if: provable_zero
      possibly_transmitted: [partial_write, indeterminate_error, cancellation_race, ambiguous_completion]
      full_transmit_success_transition: response_wait
      tcp_possibly_transmitted_action: [tombstone_transaction_id, close_connection_prevent_stream_desync, reconnect_increment_generation, reject_old_generation]
      tcp_response_wait_abandonment: {triggers: [timeout, cancellation], transaction_id_action: tombstone, late_response: drop, same_socket_reuse: forbidden_until_normal_tombstone_rollover}
      rtu_possibly_transmitted_action: quarantine_resynchronize_or_recover_before_successor
      rtu_response_wait_abandonment: {triggers: [timeout, cancellation], action: quarantine_resynchronize_or_recover_before_successor}
    coalescing_identity_contract:
      wire_response_id_bound_to: [physical_request_id, endpoint, unit_id, function_code, logical_table, physical_zero_based_pdu_offset, physical_word_count, transport_generation_id]
      logical_view_fields: [logical_view_id, wire_response_id, logical_zero_based_pdu_offset, logical_word_count, slice_offset_within_wire, slice_word_count]
      logical_view_per_dependent_observation: required
      replay: exact_words_and_provenance
      success_case: unequal_overlapping_reads
      incompatible_dimensions: [unit_id, logical_table, authorization_scope, poll_generation_id, operation_deadline]
    rtu_physical_qualification_contract:
      gate: RTU_PHYSICAL_QUALIFICATION_V1
      dispositions: [PHYSICALLY_QUALIFIED, FIXTURE_ONLY_NO_HARDWARE]
      fixture_only: {default: disabled, enabled_claim: forbidden, maturity: experimental}
      required_evidence: [adapter_transceiver_identity, baud_and_topology, measured_physical_silent_intervals, timeout_cancellation_quarantine_trace]
      no_hardware: {supported_claim: forbidden, enabled_claim: forbidden, blocks_tcp_fronius: false, blocks_tcp_sufficient_m1_m7: false}
    rollback: Correct the public contract before implementation; after dependent APIs publish, use a versioned forward correction.
  - id: FMV3-M1-01
    milestone: M1
    repo: Project-Helianthus/helianthus-modbus
    depends_on: [FMV3-M0-02, FMV3-M1-00]
    what: Implement strict Modbus protocol types, read request/response codecs, exception handling, and bounded limits.
    acceptance: Against merged companion FMV3-M1-00, RED-first tests cover malformed lengths, identity, exceptions, and the exact FC03/FC04/FC2B-MEI0E allowlist. FC03/FC04 ranges preserve distinct provenance. Device Identification tests cover conformity levels, individual/regular/extended object access, object IDs, segmentation/more-follows, bounded aggregation, exceptions, and malformed responses without profile semantics or string normalization.
    gates: [TDD_RED, CI, doc_gate, transport_gate, security]
    doc_gate: required
    companion_issue: FMV3-M1-00
    phase1_read_only_operations: [fc03_read_holding_registers, fc04_read_input_registers, fc2b_mei0e_read_device_identification]
    rollback: Revert the unpublished API or add a compatible correction before downstream release.
  - id: FMV3-M1-02
    milestone: M1
    repo: Project-Helianthus/helianthus-modbus
    depends_on: [FMV3-M1-01]
    what: Implement Modbus TCP endpoint ownership, scheduler, pooling, fairness, coalescing, backoff, reconnect, cancellation, and limits.
    acceptance: Deterministic tests prove one endpoint owner and allocator/map per TCP socket plus existing correlation/abandonment behavior. A wire_response_id binds each physical request/range; unequal overlapping compatible reads coalesce, and each dependent logical_view_id/slice replays its exact words/provenance. Cross-unit, cross-table, cross-authorization, cross-generation, and deadline-incompatible reads do not coalesce. Tombstone reuse/exhaustion, bounded correlation, isolated unit/profile state, and absence of profile semantics remain covered.
    gates: [TDD_RED, CI, doc_gate, transport_gate, operability]
    doc_gate: required
    companion_issue: FMV3-M1-00
    tcp_correlation_contract: {scope: per_connection_socket, allocator_count: one, inflight_map_count: one, shared_unit_ids: all, match_fields: [active_connection_generation, transaction_id, echoed_unit_id, echoed_function_code, applicable_response_byte_count], request_offset_role: provenance_only, response_echoes_request_offset: false, abandoned_id: tombstone_for_socket_lifetime, same_socket_tombstone_reuse: forbidden, tombstone_exhaustion: controlled_close_reconnect, generation_increment: before_tombstoned_id_reuse, old_socket_generation_frames: reject, successful_non_abandoned_correlation: bounded, full_transmit_success_transition: response_wait, response_wait_abandonment: {triggers: [timeout, cancellation], transaction_id_action: tombstone, late_response: drop, same_socket_reuse: forbidden_until_normal_tombstone_rollover}, unit_profile_state: isolated, endpoint_scheduling: shared, profile_semantics: forbidden}
    coalescing_identity_contract:
      wire_response_id_bound_to: [physical_request_id, endpoint, unit_id, function_code, logical_table, physical_zero_based_pdu_offset, physical_word_count, transport_generation_id]
      logical_view_fields: [logical_view_id, wire_response_id, logical_zero_based_pdu_offset, logical_word_count, slice_offset_within_wire, slice_word_count]
      logical_view_per_dependent_observation: required
      replay: exact_words_and_provenance
      success_case: unequal_overlapping_reads
      incompatible_dimensions: [unit_id, logical_table, authorization_scope, poll_generation_id, operation_deadline]
    abnormal_write_results: [provable_zero, partial_write, indeterminate_error, cancellation_race, ambiguous_completion]
    possibly_transmitted_action: [tombstone_transaction_id, close_connection_prevent_stream_desync, reconnect_increment_generation, reject_old_generation]
    rollback: Disable the TCP runtime entry point and restore the previous gateway build without persisted-state migration.
  - id: FMV3-M1-03
    milestone: M1
    repo: Project-Helianthus/helianthus-modbus
    depends_on: [FMV3-M1-02]
    what: Implement the shared runtime contract for Modbus RTU without coupling it to Fronius phase 1.
    acceptance: RED-first fixture tests cover framing, CRC, silent intervals, abandonment, and timeout/cancellation quarantine. Capability remains disabled by default and experimental with disposition FIXTURE_ONLY_NO_HARDWARE unless RTU_PHYSICAL_QUALIFICATION_V1 records adapter/transceiver identity, baud/topology, measured physical silent intervals, and timeout/cancellation quarantine traces and yields PHYSICALLY_QUALIFIED. No hardware means no enabled/supported claim, but completes fixture conformance and blocks no TCP/Fronius path or TCP-sufficient M1/M7 work.
    gates: [TDD_RED, CI, doc_gate, transport_gate, hardware_conditional]
    doc_gate: required
    companion_issue: FMV3-M1-00
    rtu_abandonment_contract: {scope: abnormal_or_response_wait_abandonment, triggers: [partial_write, indeterminate_error, cancellation_race, ambiguous_completion], full_transmit_success_transition: response_wait, response_wait_abandonment: [timeout, cancellation], response_latency: bounded_endpoint_declared, bus_idle_resynchronization: required, frames_during_quarantine: discard, successor_transmit: after_quarantine_only, quiescence_failure: disable_and_recover_endpoint, late_same_shape_delivery: forbidden}
    rtu_physical_qualification_contract:
      gate: RTU_PHYSICAL_QUALIFICATION_V1
      dispositions: [PHYSICALLY_QUALIFIED, FIXTURE_ONLY_NO_HARDWARE]
      fixture_only: {default: disabled, enabled_claim: forbidden, maturity: experimental}
      required_evidence: [adapter_transceiver_identity, baud_and_topology, measured_physical_silent_intervals, timeout_cancellation_quarantine_trace]
      no_hardware: {supported_claim: forbidden, enabled_claim: forbidden, blocks_tcp_fronius: false, blocks_tcp_sufficient_m1_m7: false}
    abnormal_write_results: [provable_zero, partial_write, indeterminate_error, cancellation_race, ambiguous_completion]
    possibly_transmitted_action: quarantine_resynchronize_or_recover_before_successor
    rollback: Disable RTU registration while retaining the protocol and TCP APIs.
  - id: FMV3-M1-04
    milestone: M1
    repo: Project-Helianthus/helianthus-modbus
    depends_on: [FMV3-M1-02, FMV3-M1-03]
    what: Close TCP and RTU conformance, stress, cancellation, and recovery matrices.
    acceptance: TCP and RTU fixture matrices pass with no unexpected fail/xpass, retain every recovery row, and prove bounded FC2B/MEI0E Device Identification framing, segmentation, exception, and malformed-response behavior on both transports. RTU qualification disposition remains explicit, and TCP/Fronius never depends on RTU hardware.
    gates: [TDD_RED, CI, doc_gate, transport_gate, recovery]
    doc_gate: required
    companion_issue: FMV3-M1-00
    abnormal_write_results: [provable_zero, partial_write, indeterminate_error, cancellation_race, ambiguous_completion]
    full_transmit_success_transition: response_wait
    identity_operation_matrix: [tcp_fc2b_mei0e_device_identification, rtu_fc2b_mei0e_device_identification]
    transport_recovery_matrix: [tcp_provable_zero_no_abandonment, tcp_partial_write_close_reconnect, tcp_indeterminate_error_close_reconnect, tcp_cancellation_race_close_reconnect, tcp_ambiguous_completion_close_reconnect, tcp_full_transmit_timeout_tombstone, tcp_full_transmit_cancellation_tombstone, tcp_same_socket_tombstone_reuse_rejected, tcp_tombstone_exhaustion_controlled_rollover, tcp_old_generation_late_frame_rejected, rtu_provable_zero_no_abandonment, rtu_partial_write_quarantine, rtu_indeterminate_error_quarantine, rtu_cancellation_race_quarantine, rtu_ambiguous_completion_quarantine, rtu_full_transmit_timeout_quarantine, rtu_full_transmit_cancellation_quarantine, rtu_late_same_shape_discarded, rtu_quiescence_failure_endpoint_recovery]
    rollback: Hold the failing transport disabled and keep passing transports available behind explicit capability flags.
  - id: FMV3-M2-01
    milestone: M2
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M0-03, FMV3-M1-00, FMV3-M1-01]
    what: Define profile, codec, catalog, source-observation identity/coherence, and raw-provenance contracts.
    acceptance: Against merged FMV3-M1-00, versioned codecs require source validity/times, versions, sample_id, poll_generation_id, dependency_set_id, and for every dependency a logical_view_id linked to wire_response_id with logical offset/count and slice offset/count; replay reproduces exact view words/provenance even when unequal overlapping reads share one wire response. Codec order/packing, coherence, documentary normalization, and absence of canonical policy remain explicit.
    gates: [TDD_RED, CI, doc_gate, data_integrity]
    doc_gate: required
    companion_issue: FMV3-M1-00
    observation_view_fields: [logical_view_id, wire_response_id, logical_zero_based_pdu_offset, logical_word_count, slice_offset_within_wire, slice_word_count]
    rollback: Version the unpublished contract or add a compatible successor before profile release.
  - id: FMV3-M2-02
    milestone: M2
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M1-00, FMV3-M2-01]
    what: Implement deterministic profile detection and version-gated read-only probe planning.
    acceptance: Against merged companion FMV3-M1-00, tests prove bounded no-write probes, deterministic ordering, model and firmware gates, ambiguity and no-match failure, and no activation from partial evidence; fixture-only profiles are default-disabled experimental_opt_in, explicit opt-in cannot bypass gates, and auto_eligible requires a matching versioned hardware qualification record with safe mismatch, revocation, disable, and demotion behavior.
    gates: [TDD_RED, CI, doc_gate, protocol_interop, security]
    doc_gate: required
    companion_issue: FMV3-M1-00
    rollback: Disable automatic detection and require an explicit profile selection with the same validation gates.
  - id: FMV3-M2-03
    milestone: M2
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M1-00, FMV3-M2-01, FMV3-M2-02]
    what: Build sanitized fixture, replay, mutation, and cross-profile conformance harnesses.
    acceptance: Against merged FMV3-M1-00, deterministic fixtures retain codec, detector, qualification, normalization, generation, and torn-read coverage. A required mutation coalesces unequal overlapping reads and proves each linked logical view replays exact words/provenance; cross-unit, cross-table, cross-authorization, cross-generation, and deadline-incompatible mutations must refuse coalescing.
    gates: [TDD_RED, CI, doc_gate, testability, licensing]
    doc_gate: required
    companion_issue: FMV3-M1-00
    coalescing_mutation_matrix: [unequal_overlapping_reads_each_logical_view_replays_exact_words_and_provenance, cross_unit_rejected, cross_table_rejected, cross_authorization_rejected, cross_generation_rejected, deadline_incompatible_rejected]
    rollback: Quarantine a bad fixture or profile version without changing shared runtime behavior.
  - id: FMV3-M3-01
    milestone: M3
    repo: Project-Helianthus/helianthus-docs-ebus
    depends_on: [FMV3-M0-06, FMV3-M2-01]
    what: Build a provenance-qualified Fronius and SunSpec evidence packet and sanitized fixture manifest.
    acceptance: One public companion packet defines the evidence, conformance, and disposition record used by FMV3-M3-02 and FMV3-M3-03; sources, model/firmware applicability, standard use, overlay scope, unknowns, and fixture derivation are reviewable without private paths or secrets.
    gates: [doc_gate, licensing, protocol_interop]
    doc_gate: companion
    companion_for: [FMV3-M3-02, FMV3-M3-03]
    rollback: Withdraw disputed claims and retain them as labeled hypotheses until revalidated.
  - id: FMV3-M3-02
    milestone: M3
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M1-02, FMV3-M2-03, FMV3-M3-01]
    what: Implement the minimal SunSpec standard-family slice required by the Fronius phase-1 fixtures.
    acceptance: RED-first fixtures prove standard model-chain parsing, codec signedness/scale interpretation, each applicable declared multi-register word order, intra-word byte order, string packing/padding case, exact raw/sample identity, recorded documentary address normalization, profile-declared coherence, provenance, version gates, transport neutrality, and no vendor assumptions or write path.
    gates: [TDD_RED, CI, doc_gate, protocol_interop, licensing]
    doc_gate: required
    companion_issue: FMV3-M3-01
    rollback: Disable the minimal SunSpec profile version while retaining shared registry contracts.
  - id: FMV3-M3-03
    milestone: M3
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M3-02]
    what: Determine Fronius phase-1 applicability and implement only any evidence-required TCP read-only overlay.
    acceptance: Against companion FMV3-M3-01 and M3-02 conformance, record exactly STANDARD_ONLY or OVERLAY_REQUIRED publicly. Both retain evidence, fixtures, live scope, identity/provenance/coherence, read-only behavior, and green conformance CI. STANDARD_ONLY produces no implementation commit or empty overlay; only OVERLAY_REQUIRED requires a test-only RED commit and evidence-bounded overlay implementation, and either disposition unblocks M4.
    gates: [CI, doc_gate, protocol_interop, licensing, TDD_RED_IF_OVERLAY_REQUIRED]
    doc_gate: required
    companion_issue: FMV3-M3-01
    tdd_condition: OVERLAY_REQUIRED
    standard_only_contract: {evidence_and_disposition: public, conformance_ci: green, implementation_commit: forbidden, empty_overlay: forbidden}
    disposition_contract:
      allowed: [STANDARD_ONLY, OVERLAY_REQUIRED]
      completion_is_progress: true
    rollback: Invalidate the disposition when evidence changes; disable an admitted overlay while minimal SunSpec and raw Modbus access remain available.
  - id: FMV3-M4-01
    milestone: M4
    repo: Project-Helianthus/helianthus-ebusgateway
    depends_on: [FMV3-M1-02, FMV3-M3-03]
    what: Implement gateway package internal/modbusadapter and compose one owned TCP endpoint behind the existing protocol-agnostic adapter interface.
    acceptance: internal/modbusadapter is the only gateway package importing helianthus-modbus or helianthus-modbusreg and has real-module integration tests; gateway core tests use the interface and a fake adapter to prove endpoint exclusivity, unit fairness, compatible coalescing, source validity/time and unchanged sample/poll/dependency/wire-response/logical-view identity, mixed or incoherent rejection, disable, and cancellation without gateway-owned canonical freshness.
    gates: [TDD_RED, CI, transport_gate, operability]
    rollback: Disable the Modbus endpoint configuration and restart without changing eBUS behavior.
  - id: FMV3-M4-02
    milestone: M4
    repo: Project-Helianthus/helianthus-ebusgateway
    depends_on: [FMV3-M4-01]
    what: Expose bounded raw Modbus and profile-observation MCP tools before semantic promotion.
    acceptance: MCP tests expose sanitized raw reads, detector and activation-lifecycle evidence, profile identity, source validity/timestamps, physical request/range wire_response_id, each dependent logical_view_id/slice, sample/poll/dependency identity, normalization provenance, limits, and exact-view replay while rejecting writes and unbounded ranges.
    gates: [TDD_RED, CI, security, MCP_first]
    rollback: Disable the MCP tools while retaining internal read-only polling and diagnostics.
  - id: FMV3-M4-03
    milestone: M4
    repo: Project-Helianthus/helianthus-ha-addon
    depends_on: [FMV3-M4-01]
    what: Add validated endpoint configuration, secret handling, disable switch, health, and restart recovery for the add-on.
    acceptance: Tests prove atomic config validation, no secret logging, bounded restart behavior, explicit disable, and fallback to the previous image or binary.
    gates: [TDD_RED, CI, security, recovery]
    rollback: Restore the previous add-on image and disable Modbus configuration.
  - id: FMV3-M4-04
    milestone: M4
    repo: Project-Helianthus/helianthus-ebusgateway
    depends_on: [FMV3-M4-02, FMV3-M4-03]
    what: Run the required Fronius real-device TCP read-only smoke and recovery gate.
    acceptance: A reproducible lab record proves opt-in detection before qualification, bounded polling, raw MCP parity, coherent sample/wire-response/logical-view identity, source observation stop/resume across disconnect/reconnect, generation integrity, no writes, and no regression to existing gateway traffic; it records exactly GO, NO_GO, or STOP, only GO permits downstream progress, and the matching GO record qualifies only the tested profile/hardware tuple.
    gates: [CI, transport_gate, hardware_required, recovery]
    outcome_contract:
      allowed: [GO, NO_GO, STOP]
      progress: GO
      completion_is_progress: false
    rollback: Disable the endpoint and restore the prior gateway/add-on pair if smoke or recovery fails.
  - id: FMV3-M4-05
    milestone: M4
    repo: Project-Helianthus/helianthus-docs-ebus
    depends_on: [FMV3-M3-01, FMV3-M4-04]
    what: Publish sanitized Fronius live applicability evidence and retained unknowns.
    acceptance: Documentation packages the exact FMV3-M4-04 GO, NO_GO, or STOP outcome, tested model, firmware and profile versions, gateway mode, smoke result, unknown fields, and provenance without device secrets or private material paths; packaging a non-GO outcome preserves evidence but unlocks no M5 issue.
    gates: [doc_gate, licensing, hardware_required]
    packages_outcome_of: FMV3-M4-04
    rollback: Retract unsupported applicability and return affected fields to Unknown.
  - id: FMV3-M5-01
    milestone: M5
    repo: Project-Helianthus/helianthus-ebusreg
    depends_on: [FMV3-M5-02]
    what: Define protocol-independent canonical PV identities, quantities, quality, freshness, counters, and compatibility rules.
    acceptance: Work starts only after FMV3-M5-02 has merged the public contract from FMV3-M4-04 GO and packaged FMV3-M4-05 evidence; RED-first tests define stable IDs, units, canonical quality, freshness deadlines and transitions, stale/unavailable behavior, counter rollover/reset, provenance references, schema versioning, and compatibility from source validity/timestamps without delegating canonical policy upstream.
    gates: [TDD_RED, CI, doc_gate, data_integrity]
    rollback: Before publication remove the candidate; after publication retain schema/IDs and use a compatible successor or make disabled data unavailable.
  - id: FMV3-M5-02
    milestone: M5
    repo: Project-Helianthus/helianthus-docs-ebus
    depends_on: [FMV3-M4-05]
    what: Publish and merge the public canonical PV contract documentation from M4 evidence before semantic implementation.
    acceptance: Work starts only after FMV3-M4-04 records GO and FMV3-M4-05 packages that evidence; before FMV3-M5-01 implementation and semantic lock, documentation merges with proposed version, meanings, source-validity-to-canonical-quality boundary, freshness deadlines, compatibility, evidence requirements, and private-consumer boundary.
    gates: [doc_gate, licensing]
    rollback: Before publication revise/remove candidate docs; after publication correct or deprecate them with the retained normative schema.
  - id: FMV3-M5-03
    milestone: M5
    repo: Project-Helianthus/helianthus-execution-plans
    depends_on: [FMV3-M5-04]
    what: Lock the exact golden- and live-tested candidate semantic MCP version.
    acceptance: Fresh adversarial review examines the exact FMV3-M5-04 mapping, semantic MCP version, golden results, live Fronius trace, evidence, quality/freshness behavior, and compatibility, then records GO, NO_GO, or STOP. Completion is not success; GO permits FMV3-M5-09 and later consumers, while NO_GO/STOP preserves raw and candidate semantic MCP for remediation but unlocks no consumer.
    gates: [semantic_lock, adversarial_review, operator_go]
    outcome_contract:
      allowed: [GO, NO_GO, STOP]
      progress: GO
      completion_is_progress: false
    rollback: Revoke an unpublished GO decision; after publication, issue a new compatible contract and lock decision.
  - id: FMV3-M5-04
    milestone: M5
    repo: Project-Helianthus/helianthus-ebusgateway
    depends_on: [FMV3-M5-01, FMV3-M5-02]
    what: Implement the candidate Fronius-to-canonical mapping and semantic MCP before lock.
    acceptance: Golden and live Fronius tests run the exact candidate semantic MCP version, propagate sample_id, poll_generation_id and complete dependency/wire-response/logical-view identity unchanged, reject mixed/incoherent samples, preserve source validity/timestamps, apply only ebusreg-owned canonical transitions, and prove raw-to-canonical traceability. This issue is outside CG-M5-SEMANTIC-GO and creates no GraphQL or consumer contract.
    gates: [TDD_RED, CI, MCP_first, hardware_required]
    rollback: Before publication remove promotion; after publication retain schema/IDs, disable mapping, report data unavailable, and keep raw MCP.
  - id: FMV3-M5-09
    milestone: M5
    repo: Project-Helianthus/helianthus-docs-ebus
    depends_on: [FMV3-M5-03]
    what: Publish the one public PUBLIC_GRAPHQL_M2M_V1 companion contract after semantic MCP lock and before GraphQL implementation.
    acceptance: After FMV3-M5-04 semantic MCP and explicit FMV3-M5-03 GO on that exact tested version, one serialized public docs issue/PR later than FMV3-M5-02 publishes the locked schema projection, external access/security/channel, compatibility/versioning, credential lifecycle, and recovery for PUBLIC_GRAPHQL_M2M_V1; it introduces no raw registers or subscription and merges before FMV3-M5-05.
    gates: [doc_gate, licensing, semantic_lock, security]
    doc_gate: companion
    companion_for: [FMV3-M5-05]
    documents_contract: PUBLIC_GRAPHQL_M2M_V1
    contract_sections: [schema_projection, external_access_security_channel, compatibility_versioning, credential_lifecycle, recovery]
    external_channel_contract: {scope: credential_bearing_external, authentication: required, confidentiality: required, server_identity: verified, plaintext_external: reject, untrusted_server_identity: reject, mechanism: unspecified, raw_registers_in_graphql: forbidden}
    semantic_lock_ancestor: FMV3-M5-03
    rollback: Revise before GraphQL publication; after publication retain the documented version and issue a compatible correction or deprecation.
  - id: FMV3-M5-05
    milestone: M5
    repo: Project-Helianthus/helianthus-ebusgateway
    depends_on: [FMV3-M5-09]
    what: Implement GraphQL parity for the locked PV projection and publish the documented public machine-to-machine access contract.
    acceptance: Against merged companion FMV3-M5-09, GraphQL schema, resolver, authorization, and snapshots match semantic MCP and preserve canonical quality, time, unit, freshness/unavailable state, source identity, and compatible schema IDs; one externally routable endpoint contract is reachable from a separately deployed service-client context and proves noninteractive authentication/authorization, least privilege, bounded polling/rate/resources, and credential provisioning/rotation/revocation/disable/recovery. Credential-bearing external use requires the documented authenticated confidential channel with verified server identity before credentials are sent; plaintext external access and untrusted identity fail closed without prescribing the channel/auth mechanism, weakening security, adding a subscription, or exposing raw registers through GraphQL.
    gates: [TDD_RED, CI, API_parity, doc_gate, security]
    doc_gate: required
    companion_issue: FMV3-M5-09
    publishes_contract: PUBLIC_GRAPHQL_M2M_V1
    external_channel_contract: {scope: credential_bearing_external, authentication: required, confidentiality: required, server_identity: verified, plaintext_external: reject, untrusted_server_identity: reject, mechanism: unspecified, raw_registers_in_graphql: forbidden}
    rollback: Before publication remove candidate fields; after publication retain schema/IDs and forward-fix or return unavailable while the capability is disabled.
  - id: FMV3-M5-06
    milestone: M5
    repo: Project-Helianthus/helianthus-ebusgateway
    depends_on: [FMV3-M5-05]
    what: Add the Portal semantic PV view and authenticated bounded raw diagnostics/register exploration in the existing serialized gateway issue.
    acceptance: Portal semantic tests consume GraphQL only and preserve canonical identity, units, quality, freshness/unavailable state, and source timestamps; a separate authenticated/authorized raw explorer reuses the bounded raw MCP service contract with endpoint/function/range budgets, read-only allowlists, rate/resource limits, secret redaction and audit evidence, without adding raw registers to semantic GraphQL or importing Modbus outside the local adapter.
    gates: [TDD_RED, CI, consumer_parity, security]
    rollback: Disable semantic and raw Portal routes independently while published GraphQL schema/IDs remain available or explicitly unavailable and raw MCP remains policy-controlled.
  - id: FMV3-M5-07
    milestone: M5
    repo: Project-Helianthus/helianthus-ha-integration
    depends_on: [FMV3-M5-06]
    what: Consume the locked GraphQL PV contract in Home Assistant.
    acceptance: RED-first tests cover discovery, stable unique IDs, units, unavailable and stale states, restart, migration, and absence of raw Modbus coupling.
    gates: [TDD_RED, CI, consumer_parity]
    rollback: Disable entities while retaining published schema/IDs and expose unavailable; restore only a compatible integration release.
  - id: FMV3-M5-08
    milestone: M5
    repo: Project-Helianthus/helianthus-ha-addon
    depends_on: [FMV3-M5-06, FMV3-M5-07]
    what: Package and prove a recoverable public Fronius-to-HA and service-client rollout.
    acceptance: Exact-version smoke proves raw MCP, semantic MCP, GraphQL, GraphQL-only semantic Portal, authenticated bounded raw Portal exploration, and HA availability; from a separately deployed external service context it repeats endpoint reachability, noninteractive authn/authz, least privilege, bounded polling/rate/resources, credential provisioning/rotation/revocation/disable/recovery, and authenticated confidential-channel server-identity verification for exactly PUBLIC_GRAPHQL_M2M_V1. Tests reject plaintext external access and untrusted server identity before credential use, without prescribing the mechanism, plus prove restart, independent surface disable, pre-publication rollback, post-publication compatibility recovery, and no schema-less replacement for a published schema.
    gates: [CI, hardware_required, recovery, release_gate, security]
    packages_contract: PUBLIC_GRAPHQL_M2M_V1
    tests_external_channel: PUBLIC_GRAPHQL_M2M_V1
    rollback: Before publication restore the prior pair; after publication use only a schema-compatible image or keep schema/IDs and report disabled data unavailable.
  - id: FMV3-M6-00
    milestone: M6
    repo: Project-Helianthus/helianthus-docs-ebus
    depends_on: [FMV3-M5-08]
    what: Publish the sanitized public eeBUS binding and SHIP/SPINE companion contract.
    acceptance: Before private implementation, one permissively publishable companion defines PUBLIC_GRAPHQL_M2M_V1 ingress, SHIP/SPINE discovery, TLS/pairing, trust lifecycle, reconnect/revocation/reset, capability negotiation, identity, encoding, PV exchange, security boundaries, and the rule that reusable protocol knowledge cannot remain private.
    gates: [doc_gate, licensing, protocol_interop, security]
    doc_gate: companion
    companion_for: [FMV3-M6-01]
    rollback: Correct before implementation or publish a compatible successor; no private protocol code may bypass it.
  - id: FMV3-M6-01
    milestone: M6
    repo: Project-Helianthus/helianthus-eebus-binding-private
    depends_on: [FMV3-M0-04, FMV3-M6-00]
    what: Deploy a generic private eeBUS output binding that polls exactly the packaged public GraphQL machine-to-machine PV contract as its only semantic ingress.
    acceptance: A test-only RED commit is CI-observed before implementation; deployment/config tests consume exactly PUBLIC_GRAPHQL_M2M_V1 as externally tested by FMV3-M5-08, use its noninteractive least-privilege authorization, bounded polling/resources, and authenticated confidential channel with verified server identity, reject plaintext external access and untrusted server identity before credential use without prescribing the mechanism, reject incompatible schema/contract versions, and prove credential disable/recovery, reconnect/backoff, explicit capability disable, and unavailable/stale handling from ingress through output; deterministic peer tests also cover minimum SHIP/SPINE discovery, SHIP TLS/pairing, trust persistence, reconnect, revocation/reset, disable recovery, session/capability negotiation, identity, encoding, and a complete PV exchange, with no invented GraphQL subscription, Modbus, Fronius, register, gateway-internal logic, or public eeBUS repo.
    gates: [TDD_RED, CI, licensing, private_boundary, protocol_interop, security, recovery]
    doc_gate: required
    companion_issue: FMV3-M6-00
    consumes_contract: PUBLIC_GRAPHQL_M2M_V1
    access_mechanism: authenticated_bounded_query_polling
    version_compatibility: reject_incompatible_contract_versions
    authentication: noninteractive_least_privilege
    confidential_channel: required
    server_identity: verified
    credential_lifecycle_recovery: [provision, rotate, revoke, disable, recover]
    ingress_recovery: [bounded_reconnect_backoff, explicit_disable, stale_unavailable_propagation]
    forbidden_ingress_sources: [helianthus-modbus, helianthus-modbusreg, gateway_internals, undocumented_network_paths]
    tests_external_channel: PUBLIC_GRAPHQL_M2M_V1
    rollback: Disable the PV capability or revert the private artifact without changing public contracts.
  - id: FMV3-M6-02
    milestone: M6
    repo: Project-Helianthus/helianthus-eebus-binding-private
    depends_on: [FMV3-M6-01]
    what: Test actual myVaillant interoperability as a lab hypothesis.
    acceptance: Record exactly GO, NO_GO, or STOP; completion is not progress and GO is the sole objective success. GO requires an enabled and qualified live Fronius endpoint throughout the run and at least one traced observation that is available, non-stale, and generated after the recorded lab-run start. The same observation identity and value must traverse PUBLIC_GRAPHQL_M2M_V1 and eeBUS to an accepted myVaillant-side observable with matching canonical/source identity, value, unit/value semantics, quality, source-observation time, and receipt time. Replayed, synthetic, retained-cache-only, fixture-only, or simulator-only input and handshake/packet observation alone cannot GO. Existing identity/time/quality fields suffice; no new public schema field is required. NO_GO/STOP retains sanitized honest evidence, completes no plan objective, unlocks no success, and adds no vendor logic or public-schema distortion.
    gates: [CI, hardware_required, protocol_interop, security, recovery]
    outcome_contract:
      allowed: [GO, NO_GO, STOP]
      progress: GO
      success: GO
      completion_is_progress: false
    go_evidence_contract:
      minimum_locked_pv_capabilities: 1
      live_fronius_endpoint: {enabled_during_run: required, qualification: qualified, availability_during_run: required}
      traced_observation: {availability: available, freshness: non_stale, generated_after: recorded_lab_run_start}
      disallowed_inputs: [replayed, synthetic, retained_cache_only, fixture_only, simulator_only]
      capability_value_result: accepted_and_exposed
      myvaillant_side_observable: required
      path: [PUBLIC_GRAPHQL_M2M_V1, eebus, myvaillant]
      traversal_requirement: same_observation_identity_and_value
      matching_fields: [canonical_identity, source_identity, value, unit, value_semantics, quality, source_observation_timestamp, receipt_timestamp]
      public_schema_field_change: none_use_existing_identity_time_quality_contract
      handshake_or_packet_observation_only: insufficient
    rollback: Disable the private export and preserve the lab trace as sanitized evidence.
  - id: FMV3-M6-03
    milestone: M6
    repo: Project-Helianthus/helianthus-docs-ebus
    depends_on: [FMV3-M6-02]
    what: Publish sanitized reusable eeBUS and myVaillant interoperability findings.
    acceptance: Publish every reusable SHIP/SPINE, trust, identity, encoding, capability, and myVaillant interoperability finding with provenance/licensing and secret removal. If required knowledge cannot be published permissively, record STOP and make no support or interoperability claim; private-only protocol knowledge cannot satisfy M6.
    gates: [doc_gate, licensing, protocol_interop, security]
    packages_outcome_of: FMV3-M6-02
    publication_contract: {publishable_result: sanitized_public_artifact, unpublishable_result: STOP, private_only_success_claim: forbidden}
    rollback: Withdraw disputed public claims and retain STOP without changing private/public runtime contracts.
  - id: FMV3-M7-01
    milestone: M7
    repo: Project-Helianthus/helianthus-docs-ebus
    depends_on: [FMV3-M0-06, FMV3-M1-04, FMV3-M2-03, FMV3-M5-09]
    what: Build separate SunSpec, Growatt, and Huawei evidence and applicability packets.
    acceptance: After FMV3-M5-09, the companion publishes existing SunSpec/Growatt contracts and, for every vendor candidate, enumerates each detector operation/PDU and proves it is in the versioned helianthus-modbus phase-1 runtime allowlist. Every SmartLogger/S-Dongle candidate also receives a complete public admission packet or NO_ADMISSIBLE_PROFILE. EMMA discriminators are inventoried or unavailable; semantics remain deferred and missing discrimination blocks Huawei automatic eligibility.
    gates: [doc_gate, licensing, protocol_interop]
    doc_gate: companion
    companion_for: [FMV3-M7-02, FMV3-M7-03, FMV3-M7-04]
    growatt_contract_sections: [complete_candidate_contract, complete_admission_contract, qualified_candidate_facts, admission_criteria, provenance, licensing, unsupported_disposition, exact_code_doc_mapping]
    growatt_contract_completion: published_and_merged_before_close
    huawei_candidate_contract_sections: [register_map, codec, gateway_applicability, branch_applicability, version_applicability, detection, provenance, licensing, exact_code_doc_mapping]
    huawei_candidate_dispositions: [PROFILE_ADMITTED, NO_ADMISSIBLE_PROFILE]
    huawei_contract_completion: published_and_merged_before_close
    detector_runtime_operation_contract: {enumeration: per_candidate, required_runtime_allowlist: [fc03_read_holding_registers, fc04_read_input_registers, fc2b_mei0e_read_device_identification], unsupported_operation_disposition: NO_ADMISSIBLE_PROFILE, modbusreg_protocol_framing: forbidden}
    emma_discriminator_inventory: {required: [gateway, model, software, version], unavailable_disposition: mark_each_unavailable, semantics: deferred}
    rollback: Quarantine disputed facts and keep affected support states experimental or Unknown.
  - id: FMV3-M7-02
    milestone: M7
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M1-04, FMV3-M2-03, FMV3-M3-03, FMV3-M7-01]
    what: Expand the minimal M3 SunSpec slice with additional versioned standard models without vendor assumptions.
    acceptance: Conformance proves model-chain parsing, standard units and scales, every applicable declared word order, intra-word byte order, string packing/padding case, transport neutrality, version gates, unknown model handling, and codec-version provenance.
    gates: [TDD_RED, CI, doc_gate, protocol_interop, hardware_conditional]
    doc_gate: required
    companion_issue: FMV3-M7-01
    rollback: Disable the affected standard profile version in the catalog.
  - id: FMV3-M7-03
    milestone: M7
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M7-02]
    what: Decide Growatt profile admission and add profiles or overlays only when evidence permits.
    acceptance: Against the already-merged companion FMV3-M7-01, record exactly PROFILE_ADMITTED or NO_ADMISSIBLE_PROFILE. PROFILE_ADMITTED alone triggers RED-first fixtures/code for bounded read-only conformance and requires no later companion docs change. NO_ADMISSIBLE_PROFILE performs no implementation or later companion docs change, preserves the pre-published public evidence and explicit unsupported disposition, creates no catalog/support claim, and releases FMV3-M7-04 without a GO gate.
    gates: [CI, licensing, protocol_interop, hardware_conditional, doc_gate, TDD_RED_IF_PROFILE_ADMITTED]
    doc_gate: required
    companion_issue: FMV3-M7-01
    tdd_condition: PROFILE_ADMITTED
    profile_admitted_contract: {red_first_fixtures_and_code: required, later_companion_docs_change: forbidden}
    no_admissible_profile_contract: {prepublished_public_evidence_and_unsupported_disposition: preserved, implementation_commit: forbidden, catalog_entry: forbidden, support_claim: forbidden, later_companion_docs_change: forbidden}
    disposition_contract:
      allowed: [PROFILE_ADMITTED, NO_ADMISSIBLE_PROFILE]
      completion_is_progress: true
    rollback: Disable an admitted Growatt profile without changing shared contracts, or revise NO_ADMISSIBLE_PROFILE only when new qualified evidence reopens admission.
  - id: FMV3-M7-04
    milestone: M7
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M7-03]
    what: Add clean-room Huawei SmartLogger and S-Dongle profiles with branch and gateway gates.
    acceptance: For each M7-01 SmartLogger/S-Dongle candidate, record PROFILE_ADMITTED or NO_ADMISSIBLE_PROFILE. Admission requires every detector probe to map to the versioned runtime operation allowlist; modbusreg cannot frame a protocol PDU. Only admission triggers RED-first code and positive fixtures. Non-admission creates no code/catalog/support claim. EMMA and insufficiently distinguished negatives remain fail-closed.
    gates: [CI, doc_gate, protocol_interop, licensing, hardware_conditional, TDD_RED_IF_PROFILE_ADMITTED]
    doc_gate: required
    companion_issue: FMV3-M7-01
    huawei_admission_contract: {per_candidate_disposition: [PROFILE_ADMITTED, NO_ADMISSIBLE_PROFILE], admitted_requires: [published_packet, red_first_fixtures_and_code, positive_gateway_branch_version_detection_codec_fixtures], non_admitted_forbids: [implementation_commit, catalog_entry, support_claim]}
    emma_negative_fixture_contract: {inputs: [emma_endpoint, insufficiently_distinguished_endpoint], allowed_outcomes: [no_match, insufficient_evidence], forbidden_activation: [huawei_smartlogger, huawei_s_dongle], automatic_eligibility_without_reliable_discrimination: blocked}
    rollback: Disable the affected Huawei profile and return unconfirmed values to Unknown.
  - id: FMV3-M7-05
    milestone: M7
    repo: Project-Helianthus/helianthus-modbusreg
    depends_on: [FMV3-M7-04]
    what: Close cross-profile detection, ambiguity, version, mutation, activation, and lifecycle conformance.
    acceptance: A mixed catalog selects at most one eligible primary and retains activation lifecycle tests. EMMA and insufficiently distinguished negative fixtures return only no_match or insufficient_evidence, never activate SmartLogger/S-Dongle, and keep Huawei automatic eligibility blocked whenever reliable gateway/model/software/version discrimination is unavailable.
    gates: [TDD_RED, CI, protocol_interop, testability]
    emma_negative_fixture_contract: {inputs: [emma_endpoint, insufficiently_distinguished_endpoint], allowed_outcomes: [no_match, insufficient_evidence], forbidden_activation: [huawei_smartlogger, huawei_s_dongle], automatic_eligibility_without_reliable_discrimination: blocked}
    rollback: Pin the last passing catalog and disable new profile versions independently.
