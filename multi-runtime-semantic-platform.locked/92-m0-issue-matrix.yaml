- id: MSP-DOCS-CLEAN
  title: Enforce external-only documentation in helianthus-eebusreg
  repo: helianthus-eebusreg
  milestone: RECOVERY_RECONCILIATION
  complexity: 5
  docs_owner: helianthus-docs-eebus/api
  doc_gate: required
  transport_gate: none
  security_gate: required
  rollback_ledger: forward-only remove docs leakage; never restore docs/ to main
  review_ledger: code-repo documentation ownership and API extractor gate review
  tdd_mode: strict_red_green
  smoke_scope: local and GitHub docs ownership gates plus API extractor gate
  acceptance_state: proposed
  acceptance:
  - work starts from clean main and never uses code-repo docs as migration input
  - docs/ is idempotently deleted if present and never restored to main
  - tracked and untracked docs/**, symlinks, absolute paths, traversal, casefold collisions,
    extra Markdown beyond allowlist, non-template README text, and substantive package
    comments are rejected
  - AST allow/deny rules permit only concise Go package metadata comments
  - README is limited to exact minimal entry, status, and build pointers linking only
    to manifest-state active or pre-existing stable landing pages
  - positive and negative fixtures run on Linux plus macOS or portable casefold emulation
  - local and GitHub ownership gates are installed
  - API extractor implementation lives in internal/apiboundary
  - the API manifest is a CI artifact, never code-local documentation
  - path-safety and canonical_source gates are mirrored in docs-eebus and docs-ebus
    owned roots
  - break-glass restoration requires explicit owner approval, blocks all successors,
    and creates cleanup
  requires_completion_tokens:
  - MSP-DOCS-E2R-AGGREGATE
  routing_contract:
    resolver: canonical
    policy_digest: required_at_dispatch
    forbidden_tier: highest_reserved_tier
- id: MSP-DOCS-CANDIDATE-CLEANUP
  title: Withdraw abandoned eeBUS candidate docs
  repo: helianthus-docs-eebus
  milestone: RECOVERY_RECONCILIATION
  complexity: 5
  docs_owner: helianthus-docs-eebus
  doc_gate: required
  transport_gate: none
  security_gate: required
  rollback_ledger: remove expired candidate artifacts and restore docs main green
  review_ledger: withdrawn-state and candidate cleanup review
  tdd_mode: cleanup_triggered
  smoke_scope: candidate expiry, source-PR abandoned, stable-output exclusion, and
    docs-main green check
  acceptance_state: dormant_conditional
  conditional:
    activates_when: candidate expires or source PR closes unmerged
    initially_ready: false
    required_predecessor_for_normal_successors: false
    preempts_same_repo_successors: true
    blocks_cross_repo_source_rows:
    - MSP-055
  acceptance:
  - row is ignored by normal topology readiness until activated
  - activation preempts every same-repo successor
  - activation blocks the bound MSP-055 source PR even if its manifest still exact-matches
  - affected candidate entries move to withdrawn
  - candidate artifacts are removed from hidden candidate areas
  - stable navigation, search, sitemap, versioned bundles, and release bundles stay
    clean
  - docs main is restored green before same-repo successors resume
  - MSP-055 remains blocked until a fresh candidate cycle merges and passes candidate-state
    and expiry checks
  requires_completion_tokens:
  - MSP-DOCS-E2R-PUBLISH
  routing_contract:
    resolver: canonical
    policy_digest: required_at_dispatch
    forbidden_tier: highest_reserved_tier
