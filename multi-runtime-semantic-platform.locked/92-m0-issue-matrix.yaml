  docs_ebus_sequence: [MSP-DOCS-PLATFORM]
  initial_ready_set: [MSP-R00-L, DOCS-VERIFY]
  dirty_code_unlocks_successors: false
  conditional_rows:
    - MSP-DOCS-CANDIDATE-CLEANUP
  pr_required_evidence:
    - doc_gate_result
    - rollback_ledger_entry
    - relevant_transport_or_security_gate_artifact
    - review_disposition_for_every_comment
    - complete_milestone_architecture_review

gate_catalog:
  doc_gate:
    none: no companion documentation required
    required: merged canonical documentation commit required before code merge
    verify: blocking owner/license/template/path/cross-seed verification
  transport_gate:
    none: no transport/protocol gate applies
    eebus_v0: eebus-transport-gate v0 required
    ebus_t01_t88: eBUS T01..T88 required because eBUS transport/capture changed
  security_gate:
    none: no security gate applies
    required: security gate artifact required
  tdd_mode:
    not_applicable_historical: already-merged historical evidence
    plan_preflight: plan-only redaction and topology verification before mutation
    docs_checklist: documentation acceptance checklist
    docs_schema_red_green: schema and fixture contract test first, then docs/schema update
    docs_manifest_contract: ownership manifest and path-safety fixtures first, then docs migration
    cleanup_triggered: dormant until candidate expiry or source PR closure triggers cleanup
    strict_red_green: failing test or fixture first, then implementation

ownership_contract:
  absolute_invariant: >
    helianthus-eebusreg and its clean-main branches contain no docs/ directory
    and own no substantive protocol, architecture, API, harness, test, or user
    documentation. Only exact minimal README entry/status/build pointers and
    concise Go package metadata comments may remain, and those links may point
    only to manifest-state active pages or pre-existing stable landing pages.
  canonical_sources:
    helianthus-docs-eebus/protocols: eeBUS/SHIP/SPINE protocol behavior
    helianthus-docs-eebus/architecture: eeBUS runtime, adapter, trust, persistence, and lifecycle architecture
    helianthus-docs-eebus/api: eeBUS-specific Go public API schema, reference, and examples
    helianthus-docs-eebus/devices: eeBUS device notes
    helianthus-docs-eebus/evidence: public-safe evidence
    helianthus-docs-eebus/re-notes: reverse-engineering notes
    helianthus-docs-ebus/docs/platform: language-neutral cross-runtime envelopes, hash/auth binding, shared registry boundary, and promotion/consumer rules
  page_rule: every page declares canonical_source; duplication is forbidden
  manifest_states:
    planned: absent allowed, noncanonical/nonlinkable, source issue/PR required, expires after 14 days
    candidate: exists only in candidate area, hidden from stable outputs, source PR/head/hash required, expires after 30 days
    active: exists and approved/frozen
    withdrawn: excluded from stable outputs and requires cleanup
  ci_rules:
    pr: combined-ref CI verifies proposed source and docs branches together
    main: expiry CI fails stale planned/candidate entries
    uniqueness: owner/source pairs are globally unique
    source_merge: exact head match, state candidate, expires_at after trusted gate time, and no active cleanup are all required

public_evidence_privacy:
  r00_l_public_ids: random nonsemantic per-publication IDs only
  public_classes: [public_redacted, private_restricted, discarded]
  forbidden_public_fields:
    - raw_or_identifying_paths
    - volume
    - sizes
    - timestamps
    - bytes
    - deterministic_ids
    - raw_hashes
  public_commitment: opaque IDs, classes, dispositions, and redaction metadata only
  private_material: raw HMACs and opaque-ID mappings stay private

