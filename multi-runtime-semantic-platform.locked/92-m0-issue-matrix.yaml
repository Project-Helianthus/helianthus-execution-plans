- id: MSP-DOCS-API-CANDIDATE
  title: Stage the exact-head eeBUS Go public API candidate
  repo: helianthus-docs-eebus
  milestone: M4
  complexity: 7
  docs_owner: helianthus-docs-eebus/api
  doc_gate: required
  transport_gate: none
  security_gate: required
  rollback_ledger: withdraw the candidate and keep the source PR merge-blocked
  review_ledger: exact-head candidate manifest, provenance, and pre-merge ordering
    review
  tdd_mode: docs_schema_red_green
  smoke_scope: candidate hiding, attestation verification, exact-head match, and source-push
    invalidation
  acceptance_state: proposed
  acceptance:
  - after MSP-036, the single MSP-055 source PR may be prepared on an org-owned branch
    and pinned at an immutable candidate-ready head, but it remains unmerged
  - the normalized Go AST/API manifest and GitHub OIDC DSSE/in-toto attestation bind
    exactly to that source head
  - docs-eebus commits and merges the candidate manifest copy, provenance, and hidden
    candidate API pages before the source PR may merge
  - the manifest records state candidate and expires_at from trusted GitHub timestamps
  - candidate content is excluded from stable navigation, search, sitemap, versioned
    bundles, release bundles, and README links
  - any source push invalidates the candidate, re-blocks MSP-055, and requires a new
    candidate preparation cycle
  - an abandoned or expired source PR activates MSP-DOCS-CANDIDATE-CLEANUP
  requires_completion_tokens:
  - MSP-036
  - MSP-DOCS-E2
