schema_version: 2
status: locked
plan: multi-runtime-semantic-platform
baseline: Gateway 0.4.0
cruise_phase: RECOVERY_RECONCILIATION
current_milestone: RECOVERY_RECONCILIATION
accepted_through: MSP-03C plus merged MSP-03D EEBUS-G01 fake-peer harness only
dirty_rescue_candidate: true
successor_unlocks: false
successor_unlock_condition: MSP-R00 and MSP-03D-R reconciliation gates merged from clean main
purpose: >
  Machine-readable locked control-plane matrix for the eeBUS VR940f
  raw-first plan after five accepted adversarial rounds.

model_lanes:
  - model: GPT-5.3-Codex-Spark
    complexity: [1, 2]
  - model: gpt-5.4-mini
    complexity: [3, 4]
  - model: GPT-5.5 medium
    complexity: [5]
  - model: GPT-5.5 high
    complexity: [6, 7]
  - model: GPT-5.5 xhigh
    complexity: [8, 9, 10]

serialization:
  rule: one_active_pr_per_repo
  eebusreg_sequence: [MSP-03D-R, MSP-035, MSP-04A, MSP-036, MSP-055, MSP-04B, MSP-04C, MSP-045]
  initial_ready_set: [MSP-R00, DOCS-VERIFY]
  dirty_code_unlocks_successors: false
  pr_required_evidence:
    - doc_gate_result
    - rollback_ledger_entry
    - relevant_transport_or_security_gate_artifact
    - review_disposition_for_every_comment
    - complete_milestone_architecture_review

gate_catalog:
  doc_gate:
    none: no companion documentation required
    required: merged canonical documentation commit required before code merge
    verify: blocking owner/license/template/path/cross-seed verification
  transport_gate:
    none: no transport/protocol gate applies
    eebus_v0: eebus-transport-gate v0 required
    ebus_t01_t88: eBUS T01..T88 required because eBUS transport/capture changed
  security_gate:
    none: no security gate applies
    required: security gate artifact required
  tdd_mode:
    not_applicable_historical: already-merged historical evidence
    plan_preflight: plan-only redaction and topology verification before mutation
    docs_checklist: documentation acceptance checklist
    strict_red_green: failing test or fixture first, then implementation

