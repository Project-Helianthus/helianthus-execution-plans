  recovery_sequence: [MSP-R00, MSP-R00-L, DOCS-VERIFY, MSP-DOCS-API-SCHEMA, MSP-DOCS-PLATFORM, MSP-DOCS-E2, MSP-DOCS-CLEAN, MSP-03D-R]
