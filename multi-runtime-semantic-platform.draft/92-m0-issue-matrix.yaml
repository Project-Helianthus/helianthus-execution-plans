schema_version: 1
status: draft
plan: multi-runtime-semantic-platform
baseline: Gateway 0.4.0
purpose: >
  Machine-readable M0 control-plane matrix for converting the eeBUS VR940f
  raw-first draft into serialized cross-repo issues.

model_lanes:
  spark:
    model: GPT-5.3-Codex-Spark
    complexity: [1, 2]
    allowed_work: fast smoke checks, checklist gaps, mechanical consistency
  mini:
    model: gpt-5.4-mini
    complexity: [3, 4]
    allowed_work: small doc-gate, issue splitting, acceptance criteria, consistency
  55m:
    model: GPT-5.5 medium
    complexity: [5]
    allowed_work: moderate bounded owner work
  55h:
    model: GPT-5.5 high
    complexity: [6, 7]
    allowed_work: bounded protocol, runtime, security, and review work
  55x:
    model: GPT-5.5 xhigh
    complexity: [8, 9, 10]
    allowed_work: architecture, trust, MCP contracts, coexistence, promotion locks

serialization:
  rule: one_active_pr_per_repo
  same_repo_fanout: forbidden
  milestone_signoff: aggregate_only
  pr_required_evidence:
    - doc_gate_result
    - rollback_ledger_entry
    - relevant_transport_or_security_gate_artifact
    - review_disposition_for_every_comment

gate_catalog:
  acceptance_state:
    proposed: not filed or not accepted yet
    landed_pending_predecessor_acceptance: >
      repo-local work has landed, but the row must not unlock successors until
      every predecessor row is accepted
    blocked_pending_predecessor_acceptance: >
      work must not be filed or implemented until every predecessor row is
      accepted
  doc_gate:
    none: no companion documentation required
    required: merged canonical documentation commit required before code merge
  transport_gate:
    none: no transport/protocol gate applies
    eebus_v0: eebus-transport-gate v0 required
    ebus_t01_t88: eBUS T01..T88 required because eBUS transport/capture changed
  security_gate:
    none: no security gate applies
    required: security gate artifact required

